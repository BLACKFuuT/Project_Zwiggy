services:

  api:
    build: .
    container_name: zwiggy_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  celery_worker:
    build: .
    container_name: zwiggy_celery
    command: celery -A app.core.celery_app.celery_app worker --loglevel=info
    volumes:
      - .:/app
    depends_on:
      - redis
      - postgres

  postgres:
    image: postgres:15
    container_name: zwiggy_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zwiggy_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: zwiggy_redis
    ports:
      - "6379:6379"

volumes:
  postgres_data: